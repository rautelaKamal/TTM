services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ttm
      POSTGRES_PASSWORD: ttm_dev
      POSTGRES_DB: ttm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttm -d ttm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
